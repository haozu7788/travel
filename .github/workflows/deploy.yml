# .github/workflows/deploy.yml

name: Deploy to GitHub Pages

on:
  # 當推送到 main 分支時觸發
  push:
    branches:
      - main
  # 允許手動觸發
  workflow_dispatch:

# 設定權限，讓 workflow 可以部署到 gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Build and replace tokens 🔧
        run: |
          mkdir -p artifact
          echo "const GOOGLE_API_CONFIG = { API_KEY: '${{ secrets.VITE_GOOGLE_API_KEY }}', CLIENT_ID: '${{ secrets.VITE_GOOGLE_CLIENT_ID }}' };" > artifact/config.js
          cp index.html artifact/index.html

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifact

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
