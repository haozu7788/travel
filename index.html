<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊行程規劃助手 v13.2 (動態幣別支援版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .editing-row { background-color: #fff7ed !important; border-left: 4px solid #f97316; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .save-toast { animation: fadeOut 2s forwards; animation-delay: 1s; }
        .current-item { background-color: #fef08a !important; box-shadow: inset 4px 0 0 0 #eab308; }
        .day-header {
            background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #334155;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
        
        /* ==========================================
           列印專用 CSS：隱藏不必要的元素，並確保 PDF 完美排版
           ========================================== */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body { background-color: #ffffff !important; padding: 0 !important; margin: 0 !important; }
            #input-area, .no-print, .bg-slate-900, button { display: none !important; }
            #pdf-area {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 !important;
                min-width: 100% !important;
                width: 100% !important;
            }
            /* 避免表格的行、日期標題從中間被腰斬 */
            tr, .day-header { 
                page-break-inside: avoid !important; 
                break-inside: avoid !important; 
            }
            /* ★ 關鍵：避免最下方的圖片從中間被跨頁切斷 */
            .print-img-wrapper {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            thead { display: table-header-group !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans text-slate-800">

    <div id="live-tracker" class="fixed top-0 left-0 w-full bg-yellow-400 text-yellow-900 font-bold p-3 text-center shadow-lg z-50 transition-transform duration-500 -translate-y-full flex items-center justify-center gap-2 no-print border-b-4 border-yellow-500 tracking-wide text-sm md:text-base"></div>

    <div class="max-w-[1280px] mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-200" id="main-container">
        <div class="bg-slate-900 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold tracking-wider">📅 智能行程分組系統</h1>
                <p class="text-slate-400 text-sm mt-1">v13.2 - 支援動態幣別新增與自適應匯率</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <span id="save-status" class="text-green-400 text-xs font-bold opacity-0 transition-opacity mr-2">✅ 已儲存</span>
                
                <input type="file" id="fileInput" accept=".json" class="hidden" onchange="importData(this)">
                <button onclick="document.getElementById('fileInput').click()" class="text-sm bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500 transition shadow flex items-center gap-1">
                    📂 讀取 JSON
                </button>
                <button onclick="exportData()" class="text-sm bg-teal-600 text-white px-4 py-2 rounded hover:bg-teal-500 transition shadow flex items-center gap-1">
                    💾 匯出備份
                </button>
                <button onclick="clearAllData()" class="text-sm bg-red-700 text-white px-4 py-2 rounded hover:bg-red-600 transition shadow border border-red-500">
                    🗑️ 重置全部
                </button>
            </div>
        </div>

        <div class="bg-slate-800 p-3 px-6 border-t border-slate-700 text-white text-sm flex flex-wrap gap-4 items-center no-print" id="currency-bar">
            <span class="font-bold text-slate-300">💱 匯率設定：</span>
            
            <div id="dynamic-rates-container" class="flex flex-wrap gap-2 items-center">
                </div>
            
            <button onclick="addCurrency()" class="bg-slate-600 hover:bg-slate-500 text-xs px-2 py-1.5 rounded transition shadow font-bold flex items-center gap-1">
                ＋ 新增幣別
            </button>
            
            <div class="border-l border-slate-600 pl-4 flex flex-wrap items-center gap-2">
                <span class="font-bold text-slate-300">主幣別：</span>
                <input type="text" id="base_currency_code" placeholder="代碼" class="w-14 p-1 text-black rounded text-center outline-none font-bold uppercase" onchange="saveRatesToLocalStorage()">
                <input type="text" id="base_currency_symbol" placeholder="符號" class="w-10 p-1 text-black rounded text-center outline-none font-bold" onchange="saveRatesToLocalStorage()">
            </div>
        </div>

        <div class="p-6">
            <div id="input-area" class="bg-slate-50 p-6 rounded-xl border border-slate-200 mb-8 shadow-sm transition-all duration-300">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-4">
                    <input type="hidden" id="edit_id" value="">

                    <div class="lg:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">日期 *</label>
                        <input type="date" id="input_date" class="w-full p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px]">
                    </div>

                    <div class="lg:col-span-3">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">時間 *</label>
                        <div class="flex items-center gap-1">
                            <select id="input_hour" class="w-1/2 p-2 border border-slate-300 rounded focus:border-orange-500 outline-none bg-white h-[42px] text-center text-lg"></select>
                            <span class="font-bold text-slate-400">:</span>
                            <select id="input_min" class="w-1/2 p-2 border border-slate-300 rounded focus:border-orange-500 outline-none bg-white h-[42px] text-center text-lg"></select>
                        </div>
                    </div>

                    <div class="lg:col-span-3">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">目的地 *</label>
                        <input type="text" id="input_dest" placeholder="必填" class="w-full p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px]">
                    </div>

                    <div class="lg:col-span-2">
                        <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">交通 (選填)</label>
                        <div class="flex items-center gap-1">
                            <select id="input_transport" class="w-full p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px] bg-white">
                            </select>
                            <button type="button" onclick="addCustomTransport()" class="h-[42px] px-3 bg-slate-200 text-slate-700 rounded hover:bg-slate-300 transition font-bold" title="新增交通方式">＋</button>
                            <button type="button" onclick="removeSelectedTransport()" class="h-[42px] px-3 bg-red-100 text-red-500 rounded hover:bg-red-200 transition font-bold" title="刪除選定的交通方式">－</button>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">車程 (選填)</label>
                        <input type="text" id="input_duration" placeholder="30分" class="w-full p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px]">
                    </div>
                    
                    <div class="lg:col-span-2">
                        <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">費用 & 幣別</label>
                        <div class="flex gap-1">
                            <input type="number" id="input_cost" placeholder="0" class="w-2/3 p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px]">
                            <select id="input_currency" class="w-1/3 p-1 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px] bg-white font-bold text-slate-700 text-sm">
                                <!-- 由 JS 動態生成 -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="lg:col-span-2">
                        <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">分類</label>
                        <select id="input_category" class="w-full p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px] bg-white font-bold text-slate-700">
                            <option value="其他">其他</option>
                            <option value="機票">機票</option>
                            <option value="住宿">住宿</option>
                            <option value="交通">交通</option>
                            <option value="餐飲">餐飲</option>
                            <option value="門票">門票</option>
                            <option value="購物">購物</option>
                        </select>
                    </div>

                    <div class="lg:col-span-6">
                        <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">備註 (選填)</label>
                        <input type="text" id="input_notes" placeholder="訂位代號、注意事項..." class="w-full p-2 border border-slate-300 rounded focus:border-orange-500 outline-none h-[42px]">
                    </div>
                    
                    <div class="lg:col-span-2 flex items-end">
                        <button id="main-btn" onclick="handleFormSubmit()" class="w-full bg-slate-800 text-white font-bold h-[42px] rounded hover:bg-black transition shadow-lg active:scale-95 flex items-center justify-center gap-2">
                            <span>＋</span> 加入行程
                        </button>
                    </div>
                    <div class="lg:col-span-12 hidden" id="cancel-edit-area">
                        <button onclick="cancelEdit()" class="text-sm text-red-500 hover:underline">放棄修改，回到新增模式</button>
                    </div>
                </div>
            </div>

            <div id="pdf-area" class="bg-white p-4 md:p-8 border border-slate-200 rounded-lg shadow-inner w-full">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end border-b-4 border-slate-800 pb-4 mb-3 gap-4 sm:gap-0">
                    <div>
                        <h2 class="text-4xl font-black text-slate-800 italic tracking-tighter">TRAVEL PLAN</h2>
                        <p class="text-slate-400 text-sm mt-1 font-mono">Sorted by Date & Time</p>
                    </div>
                    <div class="text-left sm:text-right">
                        <div class="text-xs text-slate-400 uppercase font-bold">Total Budget</div>
                        <div class="text-3xl font-black text-orange-600"><span id="total-currency" class="text-2xl mr-1">¥</span><span id="total-amount">0</span></div>
                    </div>
                </div>

                <div id="expense-chart" class="w-full h-3 bg-slate-100 rounded-full flex overflow-hidden mb-2 shadow-inner"></div>
                <div id="expense-legend" class="flex flex-wrap gap-3 text-xs text-slate-500 font-bold mb-6"></div>
                
                <div class="overflow-x-auto print:overflow-visible mb-8">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="bg-slate-800 text-white text-xs uppercase font-bold">
                            <th class="p-3 w-[10%] text-center">時間</th>
                            <th class="p-3 w-[20%]">目的地</th>
                            <th class="p-3 w-[8%]">交通</th>
                            <th class="p-3 w-[8%] text-center">車程</th>
                            <th class="p-3 w-[14%] text-right">費用</th>
                            <th class="p-3 w-[8%] text-center">分類</th>
                            <th class="p-3 w-[22%] pl-6 border-l border-slate-600">備註</th>
                            <th class="p-3 w-[10%] text-center no-print">功能</th>
                        </tr>
                    </thead>
                    <tbody id="itinerary-list" class="divide-y divide-slate-100">
                    </tbody>
                </table>
                </div>

                <div id="packing-area" class="border-t-2 border-dashed border-slate-300 pt-6 mt-6 mb-8">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
                        <h3 class="text-lg font-bold text-slate-700 flex items-center gap-2">🎒 行李與待辦清單</h3>
                        <button onclick="loadPackingTemplate()" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded font-bold hover:bg-indigo-200 no-print transition">📋 載入出國必備範本</button>
                    </div>
                    <div class="flex gap-2 mb-5 no-print">
                        <input type="text" id="packing-input" placeholder="新增待辦事項 (例如: 買網卡、護照...)" class="flex-1 p-2 border border-slate-300 rounded outline-none focus:border-indigo-500 shadow-inner" onkeypress="if(event.key==='Enter') addPackingItem()">
                        <button onclick="addPackingItem()" class="bg-indigo-600 text-white px-5 rounded font-bold hover:bg-indigo-700 transition shadow">新增</button>
                    </div>
                    <ul id="packing-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-y-3 gap-x-6 text-sm font-bold text-slate-700">
                        </ul>
                </div>

                <div id="attachments-area" class="border-t-2 border-dashed border-slate-300 pt-6">
                    <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                        📎 附加圖片與憑證 <span class="text-xs text-slate-400 font-normal no-print">(如機票、QR Code、住宿收據，可上傳多張)</span>
                    </h3>
                    
                    <div class="mb-4 no-print">
                        <input type="file" id="imgUploadInput" accept="image/*" multiple class="hidden" onchange="handleImageUpload(this)">
                        <button onclick="document.getElementById('imgUploadInput').click()" class="text-sm bg-slate-600 text-white font-bold py-2 px-4 rounded hover:bg-slate-700 transition shadow">
                            📷 上傳圖片
                        </button>
                    </div>

                    <div id="image-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        </div>
                </div>
            </div>

            <div class="mt-8 text-center flex justify-center gap-4 no-print">
                <button onclick="generatePDF()" class="bg-green-600 text-white font-bold py-3 px-10 rounded-full shadow-xl hover:bg-green-700 transition flex items-center gap-2 hover:-translate-y-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    生成 PDF (另存為PDF)
                </button>
            </div>
            <p class="text-center text-slate-400 text-sm mt-3 no-print">💡 點擊後，請在列印畫面選擇「另存為 PDF」即可完美匯出！</p>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'my_travel_plan_v12';
        const TRANSPORT_KEY = 'my_travel_plan_transports';
        const IMAGES_KEY = 'my_travel_plan_images'; 
        const PACKING_KEY = 'my_travel_plan_packing';
        const RATES_KEY = 'my_travel_plan_rates_v13'; 

        let itineraryData = []; 
        let transportOptions = [];
        let uploadedImages = []; 
        let packingList = [];

        // 預設為日幣為主幣別，並設定相對匯率 (以 1 當地幣 = 多少日幣 為基準計算)
        let currencyData = {
            baseCode: 'JPY',
            baseSymbol: '¥',
            rates: {
                'TWD': 4.8,  // 1 TWD = 約 4.8 JPY
                'THB': 4.3,  // 1 THB = 約 4.3 JPY
                'NZD': 90.0  // 1 NZD = 約 90.0 JPY
            }
        };

        window.onload = function() {
            initDateAndTime();
            initTransports();
            loadRatesFromLocalStorage(); // 初始化匯率系統
            loadFromStorage();
            loadImagesFromStorage();
            loadPackingFromStorage();
        };

        function initDateAndTime() {
            const today = new Date();
            document.getElementById('input_date').value = today.toISOString().split('T')[0];
            const hourSelect = document.getElementById('input_hour');
            for (let i = 0; i < 24; i++) {
                const val = String(i).padStart(2, '0');
                hourSelect.add(new Option(val, val));
            }
            hourSelect.value = "09"; 
            const minSelect = document.getElementById('input_min');
            for (let i = 0; i < 60; i += 5) {
                const val = String(i).padStart(2, '0');
                minSelect.add(new Option(val, val));
            }
        }

        // ==========================
        // 動態匯率系統
        // ==========================
        function loadRatesFromLocalStorage() {
            const saved = localStorage.getItem(RATES_KEY);
            if (saved) {
                try {
                    currencyData = JSON.parse(saved);
                } catch(e) {}
            }
            renderCurrencyUI();
        }

        function saveRatesToLocalStorage() {
            currencyData.baseCode = document.getElementById('base_currency_code').value.toUpperCase() || 'JPY';
            currencyData.baseSymbol = document.getElementById('base_currency_symbol').value || '¥';
            localStorage.setItem(RATES_KEY, JSON.stringify(currencyData));
            populateCurrencyDropdown();
            refreshTable();
        }

        function renderCurrencyUI() {
            const container = document.getElementById('dynamic-rates-container');
            container.innerHTML = '';
            
            for (let code in currencyData.rates) {
                const wrapper = document.createElement('label');
                wrapper.className = "flex items-center gap-1 text-slate-300 bg-slate-700 px-2 py-1 rounded shadow-inner";
                wrapper.innerHTML = `
                    <span class="font-bold text-xs">${code}</span>
                    <input type="number" value="${currencyData.rates[code]}" step="0.01" class="w-14 p-1 text-black rounded text-center outline-none font-bold text-sm" onchange="updateRate('${code}', this.value)">
                    <button type="button" onclick="removeCurrency('${code}')" class="text-slate-400 hover:text-red-400 ml-1 font-bold transition">✕</button>
                `;
                container.appendChild(wrapper);
            }
            
            document.getElementById('base_currency_code').value = currencyData.baseCode;
            document.getElementById('base_currency_symbol').value = currencyData.baseSymbol;
            populateCurrencyDropdown();
        }

        function updateRate(code, val) {
            currencyData.rates[code] = parseFloat(val) || 1;
            saveRatesToLocalStorage();
        }

        function addCurrency() {
            const code = prompt("請輸入新的幣別代碼 (例如：USD, KRW)：");
            if (code && code.trim() !== "") {
                const upperCode = code.trim().toUpperCase();
                if (!currencyData.rates[upperCode] && upperCode !== currencyData.baseCode) {
                    currencyData.rates[upperCode] = 1.0;
                    saveRatesToLocalStorage();
                    renderCurrencyUI();
                } else if (upperCode === currencyData.baseCode) {
                    alert("該幣別已經是主幣別！");
                }
            }
        }

        function removeCurrency(code) {
            if (confirm(`確定要移除「${code}」的匯率設定嗎？`)) {
                delete currencyData.rates[code];
                saveRatesToLocalStorage();
                renderCurrencyUI();
            }
        }

        function populateCurrencyDropdown() {
            const select = document.getElementById('input_currency');
            const currentVal = select.value;
            select.innerHTML = `<option value="${currencyData.baseCode}">${currencyData.baseCode}</option>`;
            
            for (let code in currencyData.rates) {
                select.add(new Option(code, code));
            }
            
            // 保留原本選擇的值，或是預設為主幣別
            if (currentVal && (currentVal === currencyData.baseCode || currencyData.rates[currentVal])) {
                select.value = currentVal;
            } else {
                select.value = currencyData.baseCode;
            }
        }

        function toBaseCurrency(amount, currency) {
            if (!amount) return 0;
            if (currency === currencyData.baseCode) return amount;
            if (currencyData.rates[currency]) {
                return amount * currencyData.rates[currency];
            }
            return amount; 
        }

        // ==========================
        // 交通方式選單管理
        // ==========================
        function initTransports() {
            const defaultTransports = ["捷運", "公車", "開車", "火車", "高鐵", "步行", "飛機", "船"];
            const saved = localStorage.getItem(TRANSPORT_KEY);
            if (saved) {
                transportOptions = JSON.parse(saved);
            } else {
                transportOptions = [...defaultTransports];
            }
            renderTransportSelect();
        }

        function renderTransportSelect() {
            const select = document.getElementById('input_transport');
            const currentVal = select.value; 
            select.innerHTML = '<option value="">請選擇</option>';
            transportOptions.forEach(opt => {
                select.add(new Option(opt, opt));
            });
            if (transportOptions.includes(currentVal)) select.value = currentVal;
            else select.value = "";
        }

        function saveTransportOptions() {
            localStorage.setItem(TRANSPORT_KEY, JSON.stringify(transportOptions));
        }

        function addCustomTransport() {
            const custom = prompt("請輸入新的交通方式：");
            if (custom && custom.trim() !== "") {
                const val = custom.trim();
                ensureTransportOptionExists(val);
                document.getElementById('input_transport').value = val;
            }
        }

        function removeSelectedTransport() {
            const select = document.getElementById('input_transport');
            const val = select.value;
            if (!val) { alert("請先選擇一個交通方式！"); return; }
            if (confirm(`確定要刪除「${val}」選單嗎？`)) {
                transportOptions = transportOptions.filter(opt => opt !== val);
                saveTransportOptions();
                renderTransportSelect();
            }
        }

        function ensureTransportOptionExists(val) {
            if (!val || val === '-') return;
            if (!transportOptions.includes(val)) {
                transportOptions.push(val);
                saveTransportOptions();
                renderTransportSelect();
            }
        }

        // ==========================
        // 圖片上傳與管理邏輯
        // ==========================
        function handleImageUpload(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;

            const resultsArray = new Array(files.length);
            let loadedCount = 0;

            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    resultsArray[index] = e.target.result;
                    loadedCount++;
                    if (loadedCount === files.length) {
                        uploadedImages = uploadedImages.concat(resultsArray);
                        saveImagesToStorage();
                        renderImages();
                    }
                };
                reader.readAsDataURL(file);
            });
            input.value = ''; 
        }

        function deleteImage(index) {
            if (confirm("確定要刪除這張圖片嗎？")) {
                uploadedImages.splice(index, 1);
                saveImagesToStorage();
                renderImages();
            }
        }

        function renderImages() {
            const grid = document.getElementById('image-grid');
            grid.innerHTML = '';

            if (uploadedImages.length === 0) {
                grid.innerHTML = '<p class="text-slate-400 text-sm italic col-span-2 py-4 text-center no-print">目前尚無附加圖片</p>';
                return;
            }

            uploadedImages.forEach((imgBase64, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = "print-img-wrapper relative border border-slate-200 rounded-lg overflow-hidden bg-slate-50 p-2 shadow-sm";
                wrapper.innerHTML = `
                    <button onclick="deleteImage(${index})" class="no-print absolute top-3 right-3 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold hover:bg-red-700 shadow transition" title="刪除圖片">✕</button>
                    <img src="${imgBase64}" class="w-full h-auto object-contain max-h-[500px] mx-auto rounded" alt="行程附件">
                `;
                grid.appendChild(wrapper);
            });
        }

        function saveImagesToStorage() {
            try {
                localStorage.setItem(IMAGES_KEY, JSON.stringify(uploadedImages));
            } catch(e) {
                alert("圖片體積過大，已超出瀏覽器 LocalStorage 快取上限！\n但這不影響當前列印，建議匯出 JSON 做完整備份。");
            }
        }

        function loadImagesFromStorage() {
            const saved = localStorage.getItem(IMAGES_KEY);
            if (saved) {
                try {
                    uploadedImages = JSON.parse(saved);
                } catch(e) {
                    uploadedImages = [];
                }
            }
            renderImages();
        }

        function getCategoryBadge(cat) {
            const map = {
                '機票': '<span class="px-2 py-1 text-[11px] rounded bg-blue-100 text-blue-800 tracking-widest whitespace-nowrap">機票</span>',
                '住宿': '<span class="px-2 py-1 text-[11px] rounded bg-purple-100 text-purple-800 tracking-widest whitespace-nowrap">住宿</span>',
                '交通': '<span class="px-2 py-1 text-[11px] rounded bg-green-100 text-green-800 tracking-widest whitespace-nowrap">交通</span>',
                '餐飲': '<span class="px-2 py-1 text-[11px] rounded bg-yellow-100 text-yellow-800 tracking-widest whitespace-nowrap">餐飲</span>',
                '門票': '<span class="px-2 py-1 text-[11px] rounded bg-indigo-100 text-indigo-800 tracking-widest whitespace-nowrap">門票</span>',
                '購物': '<span class="px-2 py-1 text-[11px] rounded bg-pink-100 text-pink-800 tracking-widest whitespace-nowrap">購物</span>',
                '其他': '<span class="px-2 py-1 text-[11px] rounded bg-slate-100 text-slate-800 tracking-widest whitespace-nowrap">其他</span>'
            };
            return map[cat] || map['其他'];
        }

        // ==========================
        // 核心邏輯
        // ==========================
        function handleFormSubmit() {
            const editId = document.getElementById('edit_id').value;
            if (editId) saveEdit(editId);
            else addItem();
        }

        function addItem() {
            const data = getFormData();
            if (!data) return;
            data.id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            itineraryData.push(data);
            refreshTable();
            clearForm(true);
            saveToStorage();
        }

        function saveEdit(id) {
            const data = getFormData();
            if (!data) return;
            data.id = id; 
            const index = itineraryData.findIndex(item => item.id === id);
            if (index !== -1) {
                itineraryData[index] = data;
                refreshTable();
                cancelEdit();
                saveToStorage();
            }
        }

        function deleteItem(id) {
            if(confirm("確定刪除此行程嗎？")) {
                itineraryData = itineraryData.filter(item => item.id !== id);
                refreshTable();
                if (document.getElementById('edit_id').value === id) cancelEdit();
                saveToStorage();
            }
        }

        function refreshTable() {
            itineraryData.forEach(item => {
                const transportVal = item.transport === '-' ? '' : item.transport;
                ensureTransportOptionExists(transportVal);
            });

            itineraryData.sort((a, b) => {
                const timeA = new Date(`${a.dateRaw}T${a.hour}:${a.min}`).getTime();
                const timeB = new Date(`${b.dateRaw}T${b.hour}:${b.min}`).getTime();
                return timeA - timeB;
            });

            const tbody = document.getElementById('itinerary-list');
            tbody.innerHTML = '';

            if (itineraryData.length === 0) {
                calculateExpenses();
                updateTimeline();
                return;
            }

            const firstDateStr = itineraryData[0].dateRaw;
            const firstDateObj = new Date(firstDateStr);
            let lastDateStr = null;

            itineraryData.forEach(item => {
                if (item.dateRaw !== lastDateStr) {
                    const currentDateObj = new Date(item.dateRaw);
                    const diffTime = Math.abs(currentDateObj - firstDateObj);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
                    const weekdays = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
                    const weekday = weekdays[currentDateObj.getDay()];

                    const separatorRow = document.createElement('tr');
                    separatorRow.className = "day-header border-t-2 border-slate-300";
                    separatorRow.innerHTML = `
                        <td colspan="7" class="py-3 px-4 text-lg">
                            📅 第 ${diffDays} 天 - <span class="font-normal text-slate-600 text-base">${item.dateRaw.replace(/-/g, '/')} (${weekday})</span>
                        </td>
                    `;
                    tbody.appendChild(separatorRow);
                    lastDateStr = item.dateRaw;
                }

                const row = document.createElement('tr');
                row.id = `row-${item.id}`;
                row.className = "hover:bg-slate-50 transition-colors border-b border-slate-100";
                if(document.getElementById('edit_id').value === item.id) row.classList.add('editing-row');

                const displayCost = (parseFloat(item.cost) || 0) === 0 ? "-" : `<span class="text-[10px] text-slate-400 mr-1">${item.currency||currencyData.baseCode}</span>` + parseFloat(item.cost).toLocaleString();
                
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.dest)}`;
                const mapBtn = `<a href="${mapUrl}" target="_blank" class="text-blue-400 hover:text-blue-600 ml-1 no-print inline-block transform hover:scale-110 transition" title="Google Maps 導航">🗺️</a>`;

                row.innerHTML = `
                    <td class="p-3 text-center font-black text-slate-800 text-lg font-mono">${item.hour}:${item.min}</td>
                    <td class="p-3 font-bold text-slate-900 text-lg">${item.dest || "-"}${mapBtn}</td>
                    <td class="p-3 text-slate-500 text-sm">${item.transport || "-"}</td>
                    <td class="p-3 text-center text-xs font-bold text-slate-600 bg-yellow-50 rounded">${item.duration || "-"}</td>
                    <td class="p-3 text-right font-mono font-bold text-slate-700">${displayCost}</td>
                    <td class="p-3 text-center">${getCategoryBadge(item.category || '其他')}</td>
                    <td class="p-3 pl-6 text-sm text-slate-600 border-l italic">${item.notes || ""}</td>
                    <td class="p-3 text-center no-print flex justify-center gap-2">
                        <button onclick="editItem('${item.id}')" class="p-1 text-blue-500 hover:text-blue-700 font-bold">✎</button>
                        <button onclick="deleteItem('${item.id}')" class="p-1 text-red-300 hover:text-red-500 font-bold">✕</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            calculateExpenses();
            updateTimeline();
        }

        function calculateExpenses() {
            let total = 0;
            let catSum = { '機票': 0, '住宿': 0, '交通': 0, '餐飲': 0, '門票': 0, '購物': 0, '其他': 0 };
            
            itineraryData.forEach(item => {
                let val = toBaseCurrency(parseFloat(item.cost) || 0, item.currency || currencyData.baseCode);
                total += val;
                let cat = item.category || '其他';
                if(catSum[cat] !== undefined) catSum[cat] += val;
                else catSum['其他'] += val;
            });

            document.getElementById('total-amount').innerText = Math.round(total).toLocaleString();
            document.getElementById('total-currency').innerText = currencyData.baseSymbol;

            const chart = document.getElementById('expense-chart');
            const legend = document.getElementById('expense-legend');
            chart.innerHTML = ''; legend.innerHTML = '';
            if(total === 0) return;

            const styles = { '機票': ['bg-blue-500', 'text-blue-600'], '住宿': ['bg-purple-500', 'text-purple-600'], '交通': ['bg-green-500', 'text-green-600'], '餐飲': ['bg-yellow-500', 'text-yellow-600'], '門票': ['bg-indigo-500', 'text-indigo-600'], '購物': ['bg-pink-500', 'text-pink-600'], '其他': ['bg-slate-500', 'text-slate-600'] };

            for(let cat in catSum) {
                if(catSum[cat] > 0) {
                    let pct = (catSum[cat] / total * 100).toFixed(1);
                    let bar = document.createElement('div');
                    bar.className = `h-full ${styles[cat][0]}`; bar.style.width = `${pct}%`; bar.title = `${cat}: ${pct}%`;
                    chart.appendChild(bar);
                    let leg = document.createElement('div'); leg.className = `flex items-center gap-1`;
                    leg.innerHTML = `<span class="w-3 h-3 rounded-full ${styles[cat][0]} shadow-sm"></span> <span class="${styles[cat][1]} tracking-widest">${cat} ${pct}%</span>`;
                    legend.appendChild(leg);
                }
            }
        }

        function getFormData() {
            const dateVal = document.getElementById('input_date').value;
            const hourVal = document.getElementById('input_hour').value;
            const minVal = document.getElementById('input_min').value;
            const destVal = document.getElementById('input_dest').value;
            if (!dateVal || !destVal) { alert("請填寫日期與目的地！"); return null; }
            return {
                dateRaw: dateVal, hour: hourVal, min: minVal, dest: destVal,
                transport: document.getElementById('input_transport').value || "-",
                duration: document.getElementById('input_duration').value || "-",
                cost: parseFloat(document.getElementById('input_cost').value) || 0,
                currency: document.getElementById('input_currency').value || currencyData.baseCode,
                category: document.getElementById('input_category').value || "其他",
                notes: document.getElementById('input_notes').value || ""
            };
        }

        function editItem(id) {
            const item = itineraryData.find(d => d.id === id);
            if (!item) return;
            document.getElementById('edit_id').value = id;
            document.getElementById('input_date').value = item.dateRaw;
            document.getElementById('input_hour').value = item.hour;
            document.getElementById('input_min').value = item.min;
            document.getElementById('input_dest').value = item.dest;
            const transportVal = item.transport === '-' ? '' : item.transport;
            ensureTransportOptionExists(transportVal);
            document.getElementById('input_transport').value = transportVal;
            document.getElementById('input_duration').value = item.duration === '-' ? '' : item.duration;
            document.getElementById('input_cost').value = item.cost;
            document.getElementById('input_category').value = item.category || '其他';
            document.getElementById('input_notes').value = item.notes;

            // 確保要編輯的幣別存在於選單中
            const currencyVal = item.currency || currencyData.baseCode;
            if (!currencyData.rates[currencyVal] && currencyVal !== currencyData.baseCode) {
                currencyData.rates[currencyVal] = 1.0;
                saveRatesToLocalStorage();
                renderCurrencyUI();
            }
            document.getElementById('input_currency').value = currencyVal;

            const btnArea = document.getElementById('main-btn');
            btnArea.innerHTML = "💾 保存修改";
            btnArea.classList.replace('bg-slate-800', 'bg-orange-600');
            document.getElementById('cancel-edit-area').classList.remove('hidden');
            document.getElementById('input-area').scrollIntoView({ behavior: 'smooth' });
            refreshTable();
        }

        function cancelEdit() {
            document.getElementById('edit_id').value = "";
            const btnArea = document.getElementById('main-btn');
            btnArea.innerHTML = "<span>＋</span> 加入行程";
            btnArea.classList.replace('bg-orange-600', 'bg-slate-800');
            document.getElementById('cancel-edit-area').classList.add('hidden');
            clearForm(true);
            refreshTable();
        }

        function clearForm(keepDateTime = false) {
            document.getElementById('input_dest').value = '';
            document.getElementById('input_transport').value = '';
            document.getElementById('input_duration').value = '';
            document.getElementById('input_cost').value = '';
            document.getElementById('input_currency').value = currencyData.baseCode;
            document.getElementById('input_category').value = '其他';
            document.getElementById('input_notes').value = '';
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(itineraryData));
            showSaveStatus();
        }

        function loadFromStorage() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    itineraryData = fixMissingIds(JSON.parse(savedData));
                    refreshTable();
                } catch(e) {
                    console.error("讀取快取失敗", e);
                }
            }
        }

        // ==========================
        // 待辦清單邏輯
        // ==========================
        function loadPackingFromStorage() {
            const saved = localStorage.getItem(PACKING_KEY);
            if (saved) packingList = JSON.parse(saved);
            renderPackingList();
        }
        function savePackingToStorage() { localStorage.setItem(PACKING_KEY, JSON.stringify(packingList)); }
        function renderPackingList() {
            const ul = document.getElementById('packing-list'); ul.innerHTML = '';
            packingList.forEach(item => {
                const li = document.createElement('li');
                li.className = "flex items-center gap-2 group p-1 hover:bg-slate-50 rounded transition";
                li.innerHTML = `
                    <input type="checkbox" id="pack-${item.id}" ${item.done ? 'checked' : ''} class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer border-slate-300" onchange="togglePacking('${item.id}')">
                    <label for="pack-${item.id}" class="flex-1 cursor-pointer select-none ${item.done ? 'line-through text-slate-400' : ''}">${item.text}</label>
                    <button onclick="deletePacking('${item.id}')" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition no-print bg-white rounded-full w-5 h-5 flex items-center justify-center font-bold">✕</button>
                `;
                ul.appendChild(li);
            });
        }
        function addPackingItem() {
            const input = document.getElementById('packing-input');
            const text = input.value.trim();
            if (!text) return;
            packingList.push({ id: Date.now().toString(), text, done: false });
            input.value = ''; savePackingToStorage(); renderPackingList();
        }
        function togglePacking(id) {
            const item = packingList.find(i => i.id === id);
            if (item) { item.done = !item.done; savePackingToStorage(); renderPackingList(); }
        }
        function deletePacking(id) {
            packingList = packingList.filter(i => i.id !== id);
            savePackingToStorage(); renderPackingList();
        }
        function loadPackingTemplate() {
            if(confirm("將附加出國必備清單至目前的列表中，確定嗎？")) {
                const templates = ["護照 (效期>6個月)", "簽證/入境申請表", "當地網卡/eSIM", "萬國轉接頭", "行動電源與充電線", "常備藥品 (腸胃/感冒)", "信用卡與外幣現金", "換洗衣物與外套", "個人盥洗/防曬用品", "旅平險保單憑證"];
                templates.forEach(text => {
                    if(!packingList.some(i => i.text === text)) {
                        packingList.push({ id: Math.random().toString(36).substr(2, 9), text, done: false });
                    }
                });
                savePackingToStorage(); renderPackingList();
            }
        }

        function exportData() {
            if (itineraryData.length === 0 && uploadedImages.length === 0 && packingList.length === 0) { alert("沒有資料可匯出"); return; }
            const packageData = {
                itinerary: itineraryData,
                images: uploadedImages,
                packing: packingList,
                rates: currencyData
            };
            const blob = new Blob([JSON.stringify(packageData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `行程與憑證備份_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function importData(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if(confirm("確定載入此檔案嗎？目前資料將被覆蓋。")) {
                        if (Array.isArray(parsed)) {
                            // 舊版純行程資料
                            itineraryData = fixMissingIds(parsed); 
                            uploadedImages = [];
                        } else if (parsed.itinerary) {
                            itineraryData = fixMissingIds(parsed.itinerary);
                            uploadedImages = parsed.images || [];
                            packingList = parsed.packing || [];
                            if (parsed.rates) {
                                if(parsed.rates.baseCode) {
                                    currencyData = parsed.rates;
                                }
                                saveRatesToLocalStorage();
                                renderCurrencyUI(); // 更新介面
                            }
                        } else {
                            throw new Error();
                        }
                        refreshTable(); 
                        renderImages();
                        renderPackingList();
                        saveToStorage();
                        saveImagesToStorage();
                        savePackingToStorage();
                    }
                } catch(err) { alert("檔案格式錯誤，無法正確解析"); }
                input.value = '';
            };
            reader.readAsText(file);
        }

        function fixMissingIds(data) {
            return data.map((item, index) => item.id ? item : { ...item, id: Date.now().toString() + index });
        }

        function clearAllData() {
            if(confirm("確定要清空所有行程與圖片嗎？")) { 
                itineraryData = []; 
                uploadedImages = [];
                packingList = [];
                refreshTable(); 
                renderImages();
                renderPackingList();
                saveToStorage(); 
                saveImagesToStorage();
                savePackingToStorage();
            }
        }

        function showSaveStatus() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1'; status.classList.remove('save-toast');
            void status.offsetWidth; status.classList.add('save-toast');
        }
        
        function updateTimeline() {
            const now = new Date();
            let nextItem = null;
            let currentItem = null;
            
            for(let i=0; i<itineraryData.length; i++) {
                const item = itineraryData[i];
                const itemTime = new Date(`${item.dateRaw}T${item.hour}:${item.min}`);
                if (itemTime > now) {
                    nextItem = item;
                    if (i > 0 && itineraryData[i-1].dateRaw === item.dateRaw) currentItem = itineraryData[i-1];
                    break;
                }
            }

            document.querySelectorAll('.current-item').forEach(el => el.classList.remove('current-item'));
            if (currentItem) {
                const row = document.getElementById(`row-${currentItem.id}`);
                if (row) row.classList.add('current-item');
            }

            const tracker = document.getElementById('live-tracker');
            if (nextItem) {
                const diffMs = new Date(`${nextItem.dateRaw}T${nextItem.hour}:${nextItem.min}`) - now;
                const hrs = Math.floor(diffMs / 3600000); const mins = Math.floor((diffMs % 3600000) / 60000);
                if (hrs < 24) {
                    tracker.innerHTML = `📍 距離下一個行程「<span class="underline underline-offset-4">${nextItem.dest}</span>」還有 <span class="text-xl mx-1">${hrs > 0 ? hrs + ' 小時 ' : ''}${mins} 分鐘</span>`;
                    tracker.classList.remove('-translate-y-full'); tracker.classList.add('translate-y-0');
                    return;
                }
            }
            tracker.classList.add('-translate-y-full'); tracker.classList.remove('translate-y-0');
        }

        function generatePDF() {
            window.print();
        }
    </script>
</body>
</html>
